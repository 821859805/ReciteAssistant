<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReciteAssistant - 复习</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/vendor/hljs-styles/github.min.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">RA</div>
          <div class="title">
            <div class="name">ReciteAssistant</div>
            <div class="desc">复习（仅已学习题目，按自评优先级排序）</div>
          </div>
        </div>
        <div class="actions">
          <a class="btn secondary" href="/manage.html">题库管理</a>
          <a class="btn secondary" href="/learn-new.html">学习（新题/遗忘）</a>
          <label class="btn secondary">
            导入题库(JSON)
            <input id="importFile" type="file" accept="application/json" hidden />
          </label>
          <a class="btn secondary" href="/api/export">导出题库</a>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="panel">
            <div class="panelTitle">学习范围（题库 / 章节）</div>
            <div class="field">
              <div class="label">题库</div>
              <select id="bankSelect"></select>
            </div>
            <div class="field">
              <div class="label">章节</div>
              <select id="chapterSelect"></select>
            </div>
          </div>

          <div class="panel">
            <div class="panelTitle">复习</div>
            <div class="field">
              <div class="label">每次取题数</div>
              <input id="limitInput" type="number" min="5" max="200" value="30" />
            </div>
            <button id="startBtn" class="btn primary full">开始复习</button>
            <div class="stats" id="stats"></div>
          </div>

          <div class="panel subtle">
            <div class="panelTitle">复习规则</div>
            <ul class="tips">
              <li><b>仅复习已学习题目</b>：未学习题目请去“学习（新题/遗忘）”。</li>
              <li><b>优先级</b>：按自评从低到高；同分按上次复习时间更久优先。</li>
              <li><b>遮盖-回忆-揭示</b>：先回忆，再看答案，再评分更新优先级。</li>
            </ul>
          </div>
        </aside>

        <section class="content">
          <div class="card" id="learnCard">
            <div class="cardHeader">
              <div class="badge" id="queueBadge">未开始</div>
              <div class="counter" id="counter">0 / 0</div>
            </div>

            <div class="question" id="questionTitle">选择范围并开始复习</div>

            <div class="recall">
              <div class="recallTitle">主动回忆区（先说出来/写下来）</div>
              <textarea id="recallInput" placeholder="在这里写下你的回答要点（可选，用于强制回忆）。"></textarea>
            </div>

            <div class="answer">
              <div class="answerHeader">
                <div class="row" style="gap:8px">
                  <div class="answerTitle">答案</div>
                  <div class="muted" id="reviewCharCount">字数：0</div>
                </div>
                <button id="toggleAnswerBtn" class="btn secondary">显示答案</button>
              </div>
              <div id="answerBody" class="answerBody hidden"></div>
            </div>

            <div class="rate">
              <div class="rateTitle">自评（0-5）</div>
              <div class="rateBtns">
                <button class="rateBtn q0" data-q="0" disabled>0 忘了</button>
                <button class="rateBtn q1" data-q="1" disabled>1 很吃力</button>
                <button class="rateBtn q2" data-q="2" disabled>2 勉强</button>
                <button class="rateBtn q3" data-q="3" disabled>3 还行</button>
                <button class="rateBtn q4" data-q="4" disabled>4 熟练</button>
                <button class="rateBtn q5" data-q="5" disabled>5 秒答</button>
              </div>
              <div class="nextHint" id="nextHint"></div>
            </div>
          </div>

        </section>
      </main>
    </div>

    <script type="module" src="/hljs-init.js"></script>
    <script src="/md.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
