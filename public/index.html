<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReciteAssistant - 复习</title>
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/vendor/hljs-styles/vs2015.min.css" />
  </head>
  <body>
    <nav class="activity-bar">
      <a href="/" class="activity-btn active" title="复习">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
        <span class="activity-label">复习</span>
      </a>
      <a href="/learn-new.html" class="activity-btn" title="学习">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        <span class="activity-label">学习</span>
      </a>
      <a href="/manage.html" class="activity-btn" title="题库管理">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <span class="activity-label">管理</span>
      </a>
      <a href="/python-editor.html" class="activity-btn" title="Python编辑器">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span class="activity-label">Python</span>
      </a>
    </nav>

    <div class="app-body">
      <main class="layout">
        <aside class="sidebar">
          <div class="panel">
            <div class="panelTitle">学习范围（题库 / 章节）</div>
            <div class="field">
              <div class="label">题库</div>
              <select id="bankSelect"></select>
            </div>
            <div class="field">
              <div class="label">章节</div>
              <select id="chapterSelect"></select>
            </div>
          </div>

          <div class="panel">
            <div class="panelTitle">复习</div>
            <div class="field">
              <div class="label">每次取题数</div>
              <input id="limitInput" type="number" min="5" max="200" value="30" />
            </div>
            <button id="startBtn" class="btn primary full">开始复习</button>
            <div class="stats" id="stats"></div>
          </div>

          <div class="panel subtle">
            <div class="panelTitle">复习规则</div>
            <ul class="tips">
              <li><b>仅复习已学习题目</b>：未学习题目请去“学习（新题/遗忘）”。</li>
              <li><b>优先级</b>：按熟练度从低到高；同级按上次复习时间更久优先。</li>
              <li><b>遮盖-回忆-揭示</b>：先回忆，再看答案，再设置熟练度。</li>
            </ul>
          </div>
        </aside>

        <section class="content">
          <div class="card" id="learnCard">
            <div class="cardHeader">
              <div class="badge" id="queueBadge">未开始</div>
              <div class="row" style="gap:12px; align-items:center">
                <button id="prevQuestionBtn" class="btn secondary" disabled>上一题</button>
                <div class="counter" id="counter">0 / 0</div>
                <button id="nextQuestionBtn" class="btn secondary" disabled>下一题</button>
              </div>
            </div>

            <div class="question" id="questionTitle">选择范围并开始复习</div>

            <div class="recall">
              <div class="recallTitle">主动回忆区（先说出来/写下来）</div>
              <div class="recallTools">
                <div class="row" style="gap:8px">
                  <button id="recallRecordBtn" class="btn secondary">录音输入</button>
                  <button id="recallStopBtn" class="btn secondary" disabled>停止</button>
                  <button id="recallSubmitBtn" class="btn primary">提交答案并对比</button>
                  <button id="recallClearBtn" class="btn secondary">清空</button>
                </div>
                <div class="recallStatus muted" id="recallStatus">提示：可先口述（语音转文字）或手动输入要点，再提交与标准答案做相似度对比。</div>
                <div class="recallScore" id="recallScore"></div>
              </div>
              <textarea id="recallInput" placeholder="在这里写下你的回答要点（可选，用于强制回忆）。"></textarea>
            </div>

            <div class="answer">
              <div class="answerHeader">
                <div class="row" style="gap:8px">
                  <div class="answerTitle">答案</div>
                  <div class="muted" id="reviewCharCount">字数：0</div>
                </div>
                <button id="toggleAnswerBtn" class="btn secondary">显示答案</button>
              </div>
              <div id="answerBody" class="answerBody hidden"></div>
            </div>

            <div class="rate">
              <div class="rateTitle">设置熟练度（0-6）</div>
              <div class="rateBtns rateBtns7">
                <button class="rateBtn q0" data-q="0" disabled>0 新题</button>
                <button class="rateBtn q1" data-q="1" disabled>1 学一遍</button>
                <button class="rateBtn q2" data-q="2" disabled>2 学两遍</button>
                <button class="rateBtn q3" data-q="3" disabled>3 初步</button>
                <button class="rateBtn q4" data-q="4" disabled>4 基本</button>
                <button class="rateBtn q5" data-q="5" disabled>5 熟练</button>
                <button class="rateBtn q6" data-q="6" disabled>6 完全</button>
              </div>
              <div class="nextHint" id="nextHint"></div>
            </div>
          </div>

        </section>
      </main>
    </div>

    <script src="/hljs-bundle.js"></script>
    <script src="/hljs-init.js"></script>
    <script src="/md.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
