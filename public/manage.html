<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReciteAssistant - 题库管理</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">RA</div>
          <div class="title">
            <div class="name">题库管理</div>
            <div class="desc">题库 / 章节 / 小节 / 题目 增删改查</div>
          </div>
        </div>
        <div class="actions">
          <a class="btn secondary" href="/">学习页</a>
          <a class="btn secondary" href="/learn-new.html">新题/遗忘题学习</a>
          <label class="btn secondary">
            导入题库(JSON)
            <input id="importFile" type="file" accept="application/json" hidden />
          </label>
          <a class="btn secondary" href="/api/export">导出题库</a>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="panel">
            <div class="panelTitle">目录（两级：题库 / 章节）</div>
            <div class="row">
              <button id="addBankBtn" class="btn secondary">+ 题库</button>
              <div class="muted">左侧直接改名，失去焦点自动保存</div>
            </div>
            <div id="tree" class="tree"></div>
          </div>
        </aside>

        <section class="content">
          <div class="panel">
            <div class="panelTitle">题目（当前章节）</div>
            <div class="row">
              <button id="newQuestionBtn" class="btn secondary">+ 题目</button>
              <div class="muted" id="scopeHint"></div>
              <div class="muted" id="saveMsg"></div>
            </div>
            <div class="split">
              <div class="listWrap">
                <div id="questionsList" class="list"></div>
              </div>
              <div class="editor">
                <div class="field">
                  <div class="label">题目标题（失去焦点自动保存）</div>
                  <input id="qTitle" placeholder="例如：HashMap 与 ConcurrentHashMap 有何区别？" />
                </div>
                <div class="field">
                  <div class="label">答案内容（失去焦点自动保存）</div>
                  <textarea id="qContent" placeholder="建议结构：定义 → 原理 → 细节 → 例子 → 对比 → 场景/调优"></textarea>
                </div>
                <div class="row">
                  <button id="deleteQuestionBtn" class="btn secondary">删除该题</button>
                  <div class="muted">提示：切换题目/目录时会触发失焦保存</div>
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/manage.js"></script>
  </body>
</html>
