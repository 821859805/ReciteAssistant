<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReciteAssistant - 题库管理</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div class="brand">
          <div class="logo">RA</div>
          <div class="title">
            <div class="name">题库管理</div>
            <div class="desc">题库 / 章节 / 题目：左侧目录编辑，右侧仅编辑内容</div>
          </div>
        </div>
        <div class="actions">
          <a class="btn secondary" href="/">学习页</a>
          <a class="btn secondary" href="/learn-new.html">新题/遗忘题学习</a>
          <label class="btn secondary">
            导入题库(JSON)
            <input id="importFile" type="file" accept="application/json" hidden />
          </label>
          <a class="btn secondary" href="/api/export">导出题库</a>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="panel">
            <div class="panelTitle">目录（三级：题库 / 章节 / 题目）</div>
            <div class="row">
              <button id="addBankBtn" class="btn secondary">+ 题库</button>
              <div class="muted">左侧可改名，失去焦点自动保存</div>
            </div>
            <div id="tree" class="tree"></div>
          </div>
        </aside>

        <section class="content">
          <div class="panel">
            <div class="panelTitle">题目内容（选中题目后显示）</div>
            <div class="row">
              <button id="newQuestionBtn" class="btn secondary">+ 题目</button>
              <div class="muted" id="scopeHint"></div>
              <div class="muted" id="saveMsg"></div>
            </div>
            <div class="editor">
              <div class="field">
                <div class="label">答案内容（失去焦点自动保存）</div>
                <textarea id="qContent" placeholder="先在左侧选中某个题目，然后在这里编辑答案内容"></textarea>
              </div>
              <div class="row">
                <button id="deleteQuestionBtn" class="btn secondary">删除该题</button>
                <div class="muted" id="questionTitleHint">未选中题目</div>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/manage.js"></script>
  </body>
</html>
